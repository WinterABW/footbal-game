<!--
  iOS 26 Liquid Glass – coin balance pill.
  Uses lg-status-badge pattern with an extra specular top-edge shimmer.
-->
<section
  class="lg-pill lg-shimmer relative flex flex-row items-center justify-center mt-2 mb-4 z-20
         mx-auto w-fit px-3 py-1
         shadow-[0_20px_56px_rgba(0,0,0,0.55),0_0_0_1px_rgba(255,255,255,0.08)]"
  aria-label="Balance de monedas">

  <!-- specular inner-top edge -->
  <div class="absolute inset-x-0 top-0 h-px
    bg-gradient-to-r from-transparent via-white/35 to-transparent
    pointer-events-none rounded-t-full"></div>

  <div class="relative w-6 h-6 mr-1.5 flex-shrink-0
    drop-shadow-[0_0_15px_rgba(251,191,36,0.65)]">
     <img ngSrc="balance-coin/coin.webp" alt="moneda"
       class="w-full h-full object-contain"
       width="28" height="28">
  </div>

  <p class="text-[1.75rem] leading-none font-black tracking-tight
    text-transparent bg-clip-text
    bg-gradient-to-b from-white via-white/90 to-white/60
    text-glow">
    {{ coins() }}
  </p>
</section>
