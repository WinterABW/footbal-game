<!-- iOS 26 Liquid Glass wallet badges -->
<section class="flex flex-col gap-1.5 absolute top-2 left-2 z-10">

  <!-- COP Balance -->
  <div class="lg-status-badge">
    <div class="w-[22px] h-[22px] flex items-center justify-center rounded-full
      bg-[rgba(255,208,96,0.18)] border border-[rgba(255,208,96,0.35)]
      shadow-[0_0_8px_rgba(255,208,96,0.30)]">
       <img ngSrc="balance-coin/coin.webp" alt="COP" width="22" height="22" class="object-contain" />
    </div>
    <span class="text-xs font-bold text-white tracking-wide text-glow">{{ formattedCop() }}</span>
  </div>

  <!-- USDT Balance -->
  <div class="lg-status-badge">
    <div class="w-[22px] h-[22px] flex items-center justify-center rounded-full
      bg-[rgba(0,212,255,0.15)] border border-[rgba(0,212,255,0.35)]
      shadow-[0_0_8px_rgba(0,212,255,0.28)]">
      <img ngSrc="wallet/cryptos/usdt.png" alt="USDT" width="18" height="18" class="object-contain" />
    </div>
    <span class="text-xs font-bold text-white tracking-wide text-glow-cyan">{{ formattedUsdt() }}</span>
  </div>

</section>
