schema: spec-driven

context: |
  Tech stack: Angular 21.1.1, TypeScript 5.9.3, Vitest, TailwindCSS 4.1.18
  Package manager: Bun
  Architecture: Standalone components, Signals for state, Lazy loading routes
  Testing: Vitest con jsdom
  Styling: TailwindCSS v4 (no @apply, mobile-first)

rules:
  proposal:
    - Include rollback plan for risky changes
    - Identify affected modules/components
  specs:
    - Use Given/When/Then format for scenarios
    - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY)
  design:
    - Include sequence diagrams for complex flows
    - Document architecture decisions with rationale
  tasks:
    - Group tasks by phase (infrastructure, implementation, testing)
    - Use hierarchical numbering (1.1, 1.2, etc.)
    - Keep tasks small enough to complete in one session
  apply:
    - Follow Angular conventions: standalone components, signals, input()/output()
    - Use TailwindCSS only, no custom CSS
    - Use OnPush change detection
  verify:
    - Run tests with vitest
    - Compare implementation against every spec scenario
  archive:
    - Warn before merging destructive deltas
